# HTTP
quarkus.http.port=8080

# CORS
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:5173
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization,Accept
quarkus.http.cors.exposed-headers=Location,Content-Type,Authorization
quarkus.http.cors.access-control-allow-credentials=true
quarkus.http.cors.access-control-max-age=86400

# JWT verificaci�n
mp.jwt.verify.issuer=https://www.kitti.es
mp.jwt.verify.publickey.location=publicKey.pem
%prod.mp.jwt.verify.publickey.location=${JWT_PUBLIC_KEY_LOCATION:/run/secrets/publicKey.pem}

# URLs de servicios internos
quarkus.rest-client.user-service.url=${USER_SERVICE_URL:http://localhost:8081}
quarkus.rest-client.auth-service.url=${AUTH_SERVICE_URL:http://localhost:8082}
quarkus.rest-client.cat-service.url=${CAT_SERVICE_URL:http://localhost:8084}
quarkus.rest-client.storage-service.url=${STORAGE_SERVICE_URL:http://localhost:8083}
quarkus.rest-client.adoption-service.url=${ADOPTION_SERVICE_URL:http://localhost:8086}
quarkus.rest-client.organization-service.url=${ORGANIZATION_SERVICE_URL:http://localhost:8088}
quarkus.rest-client.chat-service.url=${CHAT_SERVICE_URL:http://localhost:8089}

# Rate limiting (requests per minute per JVM instance)
# Override via: io.smallrye.faulttolerance."<class>/<method>".RateLimit.value=N
rate-limit.auth.login=10
rate-limit.auth.refresh=20
rate-limit.storage.upload=5

# Container image
quarkus.container-image.builder=jib
quarkus.container-image.group=ciscoadiz
quarkus.container-image.name=gateway-service
quarkus.container-image.tag=latest

# Test
quarkus.wiremock.devservices.enabled=true
%test.quarkus.http.auth.proactive=false
%test.quarkus.http.test-port=0
%test.rate-limit.auth.login=2
%test.rate-limit.auth.refresh=2
%test.rate-limit.storage.upload=2
%test.quarkus.rest-client.auth-service.url=http://localhost:${quarkus.wiremock.devservices.port}
%test.quarkus.rest-client.user-service.url=http://localhost:${quarkus.wiremock.devservices.port}
%test.quarkus.rest-client.cat-service.url=http://localhost:${quarkus.wiremock.devservices.port}
%test.quarkus.rest-client.storage-service.url=http://localhost:${quarkus.wiremock.devservices.port}
%test.quarkus.rest-client.adoption-service.url=http://localhost:${quarkus.wiremock.devservices.port}
%test.quarkus.rest-client.organization-service.url=http://localhost:${quarkus.wiremock.devservices.port}
%test.quarkus.rest-client.chat-service.url=http://localhost:${quarkus.wiremock.devservices.port}

# OpenAPI / Swagger UI ? Consolidated multi-service
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
quarkus.swagger-ui.urls.users=/api/openapi/users
quarkus.swagger-ui.urls.auth=/api/openapi/auth
quarkus.swagger-ui.urls.cats=/api/openapi/cats
quarkus.swagger-ui.urls.adoptions=/api/openapi/adoptions
quarkus.swagger-ui.urls.organizations=/api/openapi/organizations
quarkus.swagger-ui.urls.storage=/api/openapi/storage
quarkus.swagger-ui.urls-primary-name=users
%prod.quarkus.swagger-ui.enabled=false
%prod.quarkus.smallrye-openapi.enabled=false

quarkus.otel.exporter.otlp.endpoint=${OTEL_ENDPOINT:http://localhost:4317}
quarkus.otel.service.name=gateway-service
quarkus.otel.logs.enabled=true
quarkus.otel.metrics.enabled=true
%test.quarkus.otel.sdk.disabled=true
%dev.quarkus.otel.sdk.disabled=true
