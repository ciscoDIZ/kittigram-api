quarkus.http.port=8090

%dev.kitties.internal.secret=${KITTIES_INTERNAL_SECRET:kitties-dev-secret}
%prod.kitties.internal.secret=${KITTIES_INTERNAL_SECRET}
%test.kitties.internal.secret=test-internal-secret

quarkus.rest-client.user-service.url=${USER_SERVICE_URL:http://localhost:8081}
quarkus.rest-client.auth-service.url=${AUTH_SERVICE_URL:http://localhost:8082}
quarkus.rest-client.adoption-service.url=${ADOPTION_SERVICE_URL:http://localhost:8086}
quarkus.rest-client.chat-service.url=${CHAT_SERVICE_URL:http://localhost:8089}

%test.quarkus.scheduler.enabled=false
%test.quarkus.http.test-port=0

quarkus.container-image.builder=jib
quarkus.container-image.group=ciscoadiz
quarkus.container-image.name=schedule-service
quarkus.container-image.tag=latest

quarkus.otel.exporter.otlp.endpoint=${OTEL_ENDPOINT:http://localhost:4317}
quarkus.otel.service.name=schedule-service
quarkus.otel.logs.enabled=true
quarkus.otel.metrics.enabled=true
%test.quarkus.otel.sdk.disabled=true
%dev.quarkus.otel.sdk.disabled=true