# Base de datos
quarkus.datasource.db-kind=postgresql

%dev.quarkus.datasource.username=${DB_USER:kitties}
%dev.quarkus.datasource.password=${DB_PASSWORD:kitties}
%dev.quarkus.datasource.reactive.url=postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:kitties}

%prod.quarkus.datasource.username=${DB_USER:kitties}
%prod.quarkus.datasource.password=${DB_PASSWORD:kitties}
%prod.quarkus.datasource.reactive.url=postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:kitties}

%test.quarkus.datasource.devservices.image-name=postgres:16

# Hibernate
quarkus.hibernate-orm.schema-management.strategy=update
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.database.default-schema=users
%prod.quarkus.hibernate-orm.schema-management.strategy=validate
%test.quarkus.hibernate-orm.schema-management.strategy=drop-and-create
%test.quarkus.hibernate-orm.log.sql=false
%dev.quarkus.datasource.jdbc=false


# Flyway ? solo activo en prod
quarkus.flyway.enabled=false
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:kitties}
%prod.quarkus.flyway.enabled=true
%prod.quarkus.flyway.migrate-at-start=true
%prod.quarkus.flyway.schemas=users
%prod.quarkus.flyway.locations=classpath:db/migration

# gRPC servidor
quarkus.grpc.server.port=9090
%test.quarkus.grpc.server.port=0

# Shared secret for internal gRPC auth ? override with GRPC_INTERNAL_SECRET in production
%dev.grpc.internal.secret=${GRPC_INTERNAL_SECRET:kitties-dev-secret}
%prod.grpc.internal.secret=${GRPC_INTERNAL_SECRET}
%test.grpc.internal.secret=test-internal-secret

# JWT
mp.jwt.verify.issuer=https://www.kitti.es
mp.jwt.verify.publickey.location=publicKey.pem
%prod.mp.jwt.verify.publickey.location=${JWT_PUBLIC_KEY_LOCATION:/run/secrets/publicKey.pem}

# HTTP
quarkus.http.port=8081

# Mailer
%test.quarkus.mailer.mock=true

# Container image
quarkus.container-image.build=true
quarkus.container-image.push=false
quarkus.container-image.builder=jib
quarkus.container-image.group=ciscoadiz
quarkus.container-image.name=user-service
quarkus.container-image.tag=latest

# Kafka
kafka.bootstrap.servers=${KAFKA_HOST:localhost}:${KAFKA_PORT:9092}
mp.messaging.outgoing.user-registered.connector=smallrye-kafka
mp.messaging.outgoing.user-registered.topic=user-registered
mp.messaging.outgoing.user-registered.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer
%test.mp.messaging.outgoing.user-registered.connector=smallrye-in-memory

%test.quarkus.datasource.devservices.init-script-path=init-test.sql

# OpenAPI / Swagger UI
quarkus.smallrye-openapi.info-title=User Service API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=User management service for Kitties
quarkus.smallrye-openapi.security-scheme=jwt
quarkus.smallrye-openapi.security-scheme-name=BearerAuth
quarkus.smallrye-openapi.jwt-security-scheme-value=bearer
quarkus.smallrye-openapi.security-scheme-description=JWT Bearer token. Expires in 15 min. Header: Authorization: Bearer <token>
quarkus.swagger-ui.always-include=false
%prod.quarkus.swagger-ui.enabled=false
%prod.quarkus.smallrye-openapi.enabled=false
