# HTTP
quarkus.http.port=8087

# Base de datos
quarkus.datasource.db-kind=postgresql

%dev.quarkus.datasource.username=${DB_USER:kitties}
%dev.quarkus.datasource.password=${DB_PASSWORD:kitties}
%dev.quarkus.datasource.reactive.url=postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:kitties}?search_path=form_analysis
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:kitties}

%prod.quarkus.datasource.username=${DB_USER:kitties}
%prod.quarkus.datasource.password=${DB_PASSWORD:kitties}
%prod.quarkus.datasource.reactive.url=postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:kitties}?search_path=form_analysis
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:kitties}

# Flyway
quarkus.flyway.enabled=false
%prod.quarkus.flyway.enabled=true
%prod.quarkus.flyway.migrate-at-start=true
%prod.quarkus.flyway.schemas=form_analysis
%prod.quarkus.flyway.locations=classpath:db/migration

%prod.quarkus.hibernate-orm.schema-management.strategy=validate

%test.quarkus.datasource.devservices.image-name=postgres:16
%test.quarkus.datasource.devservices.init-script-path=init-test.sql
%test.quarkus.hibernate-orm.schema-management.strategy=drop-and-create
%test.quarkus.hibernate-orm.log.sql=false

# Hibernate
quarkus.hibernate-orm.schema-management.strategy=update
quarkus.hibernate-orm.log.sql=true

# Kafka
kafka.bootstrap.servers=${KAFKA_HOST:localhost}:${KAFKA_PORT:9092}
mp.messaging.incoming.adoption-form-submitted.connector=smallrye-kafka
mp.messaging.incoming.adoption-form-submitted.topic=adoption-form-submitted
mp.messaging.incoming.adoption-form-submitted.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.adoption-form-submitted.group.id=form-analysis-service
mp.messaging.outgoing.adoption-form-analysed.connector=smallrye-kafka
mp.messaging.outgoing.adoption-form-analysed.topic=adoption-form-analysed
mp.messaging.outgoing.adoption-form-analysed.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer

%test.mp.messaging.incoming.adoption-form-submitted.connector=smallrye-in-memory
%test.mp.messaging.outgoing.adoption-form-analysed.connector=smallrye-in-memory

# Container image
quarkus.container-image.builder=jib
quarkus.container-image.group=ciscoadiz
quarkus.container-image.name=form-analysis-service
quarkus.container-image.tag=latest

%prod.quarkus.swagger-ui.enabled=false
%prod.quarkus.smallrye-openapi.enabled=false
