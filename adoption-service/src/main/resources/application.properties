# HTTP
quarkus.http.port=8086

# Base de datos
quarkus.datasource.db-kind=postgresql

%dev.quarkus.datasource.username=${DB_USER:kittigram}
%dev.quarkus.datasource.password=${DB_PASSWORD:kittigram}
%dev.quarkus.datasource.reactive.url=postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:kittigram}?search_path=adoption

%prod.quarkus.datasource.username=${DB_USER:kittigram}
%prod.quarkus.datasource.password=${DB_PASSWORD:kittigram}
%prod.quarkus.datasource.reactive.url=postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:kittigram}?search_path=adoption

%test.quarkus.datasource.devservices.image-name=postgres:16
%test.quarkus.datasource.devservices.init-script-path=init-test.sql
%test.quarkus.hibernate-orm.schema-management.strategy=drop-and-create
%test.quarkus.hibernate-orm.log.sql=false

# Hibernate
quarkus.hibernate-orm.schema-management.strategy=update
quarkus.hibernate-orm.log.sql=true

# JWT
mp.jwt.verify.issuer=https://kittigram.ciscoadiz.org
mp.jwt.verify.publickey.location=publicKey.pem

# Container image
quarkus.container-image.builder=jib
quarkus.container-image.group=ciscoadiz
quarkus.container-image.name=adoption-service
quarkus.container-image.tag=latest