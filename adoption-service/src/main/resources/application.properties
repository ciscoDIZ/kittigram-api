# HTTP
quarkus.http.port=8086

# Base de datos
quarkus.datasource.db-kind=postgresql

%dev.quarkus.datasource.username=${DB_USER:kitties}
%dev.quarkus.datasource.password=${DB_PASSWORD:kitties}
%dev.quarkus.datasource.reactive.url=postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:kitties}?search_path=adoption
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:kitties}

%prod.quarkus.datasource.username=${DB_USER:kitties}
%prod.quarkus.datasource.password=${DB_PASSWORD:kitties}
%prod.quarkus.datasource.reactive.url=postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:kitties}?search_path=adoption
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:kitties}

# Flyway
quarkus.flyway.enabled=false
%prod.quarkus.flyway.enabled=true
%prod.quarkus.flyway.migrate-at-start=true
%prod.quarkus.flyway.schemas=adoption
%prod.quarkus.flyway.locations=classpath:db/migration

%prod.quarkus.hibernate-orm.schema-management.strategy=validate

%test.quarkus.datasource.devservices.image-name=postgres:16
%test.quarkus.datasource.devservices.init-script-path=init-test.sql
%test.quarkus.hibernate-orm.schema-management.strategy=drop-and-create
%test.quarkus.hibernate-orm.log.sql=false

# Hibernate
quarkus.hibernate-orm.schema-management.strategy=update
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.database.default-schema=adoption

# JWT
mp.jwt.verify.issuer=https://www.kitti.es
mp.jwt.verify.publickey.location=publicKey.pem
%prod.mp.jwt.verify.publickey.location=${JWT_PUBLIC_KEY_LOCATION:/run/secrets/publicKey.pem}

# Shared secret for internal service-to-service auth (gRPC + HTTP)
%dev.kitties.internal.secret=${KITTIES_INTERNAL_SECRET:kitties-dev-secret}
%prod.kitties.internal.secret=${KITTIES_INTERNAL_SECRET}
%test.kitties.internal.secret=test-internal-secret

# REST client to organization-service (internal endpoints)
quarkus.rest-client.organization-service.url=${ORGANIZATION_SERVICE_URL:http://localhost:8088}

# Kafka
kafka.bootstrap.servers=${KAFKA_HOST:localhost}:${KAFKA_PORT:9092}
mp.messaging.outgoing.adoption-form-submitted.connector=smallrye-kafka
mp.messaging.outgoing.adoption-form-submitted.topic=adoption-form-submitted
mp.messaging.outgoing.adoption-form-submitted.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer
mp.messaging.incoming.adoption-form-analysed.connector=smallrye-kafka
mp.messaging.incoming.adoption-form-analysed.topic=adoption-form-analysed
mp.messaging.incoming.adoption-form-analysed.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.adoption-form-analysed.group.id=adoption-service

%test.mp.messaging.outgoing.adoption-form-submitted.connector=smallrye-in-memory
%test.mp.messaging.incoming.adoption-form-analysed.connector=smallrye-in-memory

# Container image
quarkus.container-image.builder=jib
quarkus.container-image.group=ciscoadiz
quarkus.container-image.name=adoption-service
quarkus.container-image.tag=latest

# OpenAPI / Swagger UI
quarkus.smallrye-openapi.info-title=Adoption Service API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Cat adoption request management and processing service for Kitties
quarkus.smallrye-openapi.security-scheme=jwt
quarkus.smallrye-openapi.security-scheme-name=BearerAuth
quarkus.smallrye-openapi.jwt-security-scheme-value=bearer
quarkus.smallrye-openapi.security-scheme-description=JWT Bearer token. Expires in 15 min. Header: Authorization: Bearer <token>
quarkus.swagger-ui.always-include=false

%prod.quarkus.swagger-ui.enabled=false
%prod.quarkus.smallrye-openapi.enabled=false
